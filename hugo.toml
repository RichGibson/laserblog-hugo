# hugo.toml
baseURL = "https://laserloveandbeer.com/"
languageCode = "en-us"
title = "Laser Love and Beer"
theme = "PaperMod"

# Enable raw HTML in Markdown (needed for WordPress-era posts with inline HTML)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    noClasses = false

[pagination]
  pagerSize = 10

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  env = "production"
  author = "Rich Gibson"
  description = "My world"

  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowToc = false
  ShowRssButtonInSectionTermList = true
  defaultTheme = "auto"   # auto follows system dark/light preference

  [params.homeInfoParams]
    Title = "Laser Love and Beer"
    Content = "Making things with lasers, beer, and curiosity."

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/RichGibson"

